# Global pipeline config. See `tasks/merged_pipeline_plan.md` §2.
data_source: jump
data_source_config: jump.yml

paths:
  root: ${DATA_ROOT}

selection:
  strategy: uniform_per_well       # {uniform_per_well, all}
  cells_per_well: 50
  random_seed: 42

quality_filter:
  enabled: true
  quantiles: [0.025, 0.975]
  fields: [nuc_area, cyto_area, nuc_cyto_ratio]

crops:
  patch_size: 150                  # pre-resize
  image_size: 224                  # post-resize
  normalization:
    scheme: per_fov_percentile     # {per_fov_percentile, naive_u16_to_u8}
    low: 0.001
    high: 0.999

patching:
  patch_size_resized: 22           # int(15 * 224/150)
  pad_resized: 7                   # int(5  * 224/150)

sharding:
  parquet_rows_per_shard: 10000
  hf_rows_per_shard: 25000
  hf_max_shards: 64
  snakemake_batch_size: 250

compute:
  dask:
    n_workers: 16
    threads_per_worker: 1
  gpu:
    cellpose_vram_per_sample_mb: 200
    resize_vram_mb_max: 32000
    seg_fov_batch_size: 50

calibrate:
  fovs_per_source: 12
  random_seed: 42
  min_success_fraction: 0.7
