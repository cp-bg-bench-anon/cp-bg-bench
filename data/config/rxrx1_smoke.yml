# Smoke data-source config: tiny Rxrx1 subset for verification runs.
#
# Scoped to one experiment + plate so rules A–B can be exercised quickly.
# Outputs land under <paths.root>/rxrx1_smoke/ (named after this file's
# stem) and never collide with production artifacts.

samples:
  - experiment: HEPG2-08
    plate: "1"

metadata_url: https://storage.googleapis.com/rxrx/rxrx1/rxrx1-metadata.zip
images_zip_url: https://storage.googleapis.com/rxrx/rxrx1/rxrx1-images.zip

channel_names:
  - Hoechst      # w1 — DNA / nucleus
  - ConA         # w2 — ER
  - Phalloidin   # w3 — AGP / actin
  - Syto14       # w4 — RNA
  - MitoTracker  # w5 — Mitochondria
  - WGA          # w6 — AGP / plasma membrane

segmentation:
  model: cpsam
  channels_for_nucleus: [0]
  channels_for_cell:    [2, 0]
  default_diameters:
    nucleus: 21
    cytosol: 53
  per_source_diameters: {}
