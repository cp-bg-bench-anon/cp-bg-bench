channel_names:
  - Hoechst      # ch 1 — DNA / nucleus
  - ConA         # ch 2 — ER
  - Phalloidin   # ch 3 — AGP / actin
  - Syto14       # ch 4 — RNA
  - MitoTracker  # ch 5 — Mitochondria
  - WGA          # ch 6 — AGP / plasma membrane

segmentation:
  model: cpsam
  channels_for_nucleus: [0]
  channels_for_cell:    [2, 0]
  default_diameters:
    nucleus: 21
    cytosol: 53
  per_source_diameters: {}

