[workspace]
name = "cp-bg-bench-model"
channels = ["conda-forge", "nvidia", "pytorch"]
platforms = ["linux-64"]

# Cluster probe (Apr 2026): NVIDIA A100 MIG / H100, CUDA driver 12.9.
[system-requirements]
cuda = "12.9"

[dependencies]
python = ">=3.10"
pandas = "<3"  # scikit-fingerprints (pypi) requires pandas<3
pytorch = "2.7.*"
pytorch-lightning = ">=2.5.5,<3"
torchvision = "0.22.*"
wandb = ">=0.21.1,<0.22"
transformers = ">=4.56.1,<5"
datasets = ">=4.1.0,<5"
hydra-core = ">=1.3.2,<2"
peft = ">=0.17.1,<0.18"
rich = ">=14.1.0,<15"
cuda-version = ">=12,<13"
pytorch-gpu = ">=2.7.1,<3"
numba = ">=0.61.2,<0.62"
llvmlite = ">=0.44.0,<0.45"
biopython = ">=1.84"
bioservices = ">=1.11"
requests = ">=2.32"
anndata = ">=0.10"
scanpy = ">=1.10"

[pypi-dependencies]
cp-bg-bench-model = { path = ".", editable = true }
pycytominer = ">=1.1"
harmonypy = ">=0.0.9"

[feature.dev.dependencies]
pytest = "*"
ruff = "*"

[environments]
default = ["dev"]

[tasks]
test         = "pytest tests/"
lint         = "ruff check src tests"
fmt          = "ruff format src tests"
fmt-check    = "ruff format --check src tests"
check        = { depends-on = ["lint", "fmt-check", "test"] }

# Training entry points (run from model/ root).
# paths=local and no data-path override are the defaults.
# Named per-experiment tasks below set experiment= automatically.
model-train       = "python scripts/train.py"
model-train-fast  = "python scripts/train.py training.lightning.trainer.fast_dev_run=true"
model-resume      = "python scripts/resume.py"
model-infer       = "python scripts/run_inference.py"

# ── Per-experiment train tasks (36 configs) ───────────────────────────────────
# Usage: pixi run train-<NN> [Hydra overrides]
# e.g.:  pixi run train-13 training.lightning.trainer.max_steps=600
train-01 = "python scripts/train.py experiment=01_JUMP_DINO_ECFP4_C"
