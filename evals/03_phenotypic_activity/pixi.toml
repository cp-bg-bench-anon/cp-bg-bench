[workspace]
name = "cp-bg-bench-copairs"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10"
pandas = "<3"
numpy = "<3"
anndata = ">=0.10"
matplotlib = ">=3.9"
seaborn = ">=0.13"
jupyterlab = ">=4.3"
ipykernel = ">=7.2.0,<8"
tqdm = "*"

[pypi-dependencies]
copairs = "*"

[tasks]
lab = "jupyter lab"
register-kernel = "python -m ipykernel install --user --name cp-bg-bench-copairs --display-name 'CP-BG-Bench Copairs'"
