[workspace]
name = "cp-bg-bench-pert-recall"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10"
pandas = "<3"
numpy = "<3"
matplotlib = ">=3.9"
seaborn = ">=0.13"
jupyterlab = ">=4.3"
ipykernel = ">=7.2.0,<8"

[tasks]
lab = "jupyter lab"
register-kernel = "python -m ipykernel install --user --name cp-bg-bench-pert-recall --display-name 'CP-BG-Bench Perturbation Recall'"
