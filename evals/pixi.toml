[workspace]
name = "cp-bg-bench-evals"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10"
pandas = "<3"
numpy = "<3"
anndata = ">=0.10"
scikit-learn = ">=1.5"
matplotlib = ">=3.9"
seaborn = ">=0.13"
jupyterlab = ">=4.3"
ipykernel = ">=7.2.0,<8"
scanpy = ">=1.12.1,<2"
datasets = ">=3"

[pypi-dependencies]
scib-metrics = "*"
jax = {version = "*", extras = ["cuda12"]}
hf-transfer = ">=0.1.9, <0.2"

[tasks]
lab = "jupyter lab"
register-kernel = "python -m ipykernel install --user --name cp-bg-bench-evals --display-name 'CP-BG-Bench Evals'"

# CellProfiler-style featurisation environment (cp_measure baseline).
# Adds heavy image/numerical deps on top of the default eval environment.
[feature.featurisation.dependencies]
pyarrow = ">=15"
numba = ">=0.65"
scikit-image = ">=0.25"
scipy = ">=1.9"
mahotas = ">=1.4"
pillow = "<12"  # centrosome 1.3.3 hard-pins pillow<12

[feature.featurisation.pypi-dependencies]
centrosome = ">=1.3.3"
cp-measure = { path = "${HOME}${DATA_ROOT}", editable = true }

[environments]
featurisation = ["featurisation"]
